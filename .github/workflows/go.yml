name: Go
on: [push]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'

      - name: Check out code
        uses: actions/checkout@v4

      - name: Build
        run: go build -v .

      - name: Test
        run: go test -v ./...
